<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSS Feed Reader | Mi Lector Personal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary shadow-sm mb-4">
  <div class="container">
    <a class="navbar-brand fw-bold" href="#">
      <i class="fas fa-rss-square me-2"></i> RSS Reader Pro
    </a>
    <button class="btn btn-outline-light" id="btnUpdate">
      <i class="fas fa-sync-alt me-1"></i> Actualizar Noticias
    </button>
  </div>
</nav>

<div class="container">
  <div class="row">
    <div class="col-md-4">
      <div class="card shadow-sm mb-4">
        <div class="card-header bg-white fw-bold">Configurar Feeds</div>
        <div class="card-body">
          <div class="input-group mb-3">
            <input type="text" id="feedUrl" class="form-control" placeholder="https://ejemplo.com/rss">
            <button class="btn btn-primary" id="btnAddFeed">Añadir</button>
          </div>
          <ul class="list-group list-group-flush" id="feedList">
          </ul>
        </div>
      </div>
    </div>

    <div class="col-md-8">
      <div class="card shadow-sm mb-4">
        <div class="card-body">
          <div class="row g-2">
            <div class="col-md-7">
              <input type="text" id="searchInput" class="form-control" placeholder="Buscar por título o descripción...">
            </div>
            <div class="col-md-5">
              <select id="sortSelect" class="form-select">
                <option value="fecha_desc">Fecha (Más reciente)</option>
                <option value="fecha_asc">Fecha (Más antigua)</option>
                <option value="titulo_asc">Título (A-Z)</option>
                <option value="categoria_asc">Categoría</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <div id="newsContainer" class="row">
        <div class="col-12 text-center py-5">
          <div class="spinner-border text-primary" role="status"></div>
          <p class="mt-2 text-muted">Cargando noticias...</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="main.js"></script>
</body>
</html>
