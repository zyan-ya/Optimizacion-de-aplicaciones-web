<!DOCTYPE html>
<html> <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSS Reader Pro</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary shadow-sm mb-4">
  <div class="container">
    <a class="navbar-brand fw-bold" href="#">RSS Reader Pro</a>
    <button class="btn btn-light" id="btnUpdate">Actualizar Noticias</button>
  </div>
</nav>

<div class="container">
  <div class="row">
    <div class="col-md-8 mx-auto">
      <div class="card mb-4 p-3 shadow-sm border-0" style="border-radius: 12px;">
        <div class="row g-2">
          <div class="col-md-7">
            <input type="text" id="searchInput" class="form-control" placeholder="Buscar noticias...">
          </div>
          <div class="col-md-5">
            <select id="sortSelect" class="form-select">
              <option value="fecha_desc">Más recientes</option>
              <option value="fecha_asc">Más antiguas</option>
              <option value="titulo_asc">Título (A-Z)</option>
            </select>
          </div>
        </div>
      </div>
      <div id="newsContainer" class="row"></div>
    </div>
  </div>
</div>

<script src="main.js"></script>
</body>
</html>
